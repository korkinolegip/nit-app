name: Keep Render Warm

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          curl -sf https://nit-api-mcrw.onrender.com/health || echo "Backend waking up..."
