<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>

    <!-- Central orb glow -->
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="45%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Thread gradient -->
    <linearGradient id="t1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="18%" stop-color="rgba(255,255,255,0.65)"/>
      <stop offset="65%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="t2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="22%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="70%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="t3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="20%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="72%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- Subtle grid -->
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
    <mask id="gridMask">
      <radialGradient id="gm" cx="50%" cy="30%" r="65%">
        <stop offset="0%" stop-color="white"/>
        <stop offset="100%" stop-color="black"/>
      </radialGradient>
      <rect width="512" height="512" fill="url(#gm)"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="100"/>

  <!-- Grid overlay -->
  <rect width="512" height="512" fill="url(#grid)" mask="url(#gridMask)" rx="100"/>

  <!-- Orb glow behind threads -->
  <ellipse cx="256" cy="195" rx="130" ry="130" fill="url(#orb)"/>

  <!-- Threads — hanging from top, centered around 256 -->
  <!-- Thread 1 — main, brightest -->
  <rect x="237" y="0" width="1.2" height="310" fill="url(#t1)" opacity="0.85"/>

  <!-- Thread 2 — right, slightly offset -->
  <rect x="255" y="0" width="1" height="265" fill="url(#t2)" opacity="0.58"/>

  <!-- Thread 3 — further right -->
  <rect x="273" y="0" width="0.8" height="330" fill="url(#t1)" opacity="0.35"/>

  <!-- Thread 4 — left -->
  <rect x="220" y="0" width="0.8" height="220" fill="url(#t2)" opacity="0.25"/>

  <!-- Thread 5 — far right, faint -->
  <rect x="290" y="0" width="0.7" height="280" fill="url(#t3)" opacity="0.18"/>

  <!-- Thread 6 — far left, very faint -->
  <rect x="204" y="0" width="0.7" height="180" fill="url(#t3)" opacity="0.14"/>

  <!-- Small orb dot at center of threads -->
  <circle cx="247" cy="52" r="2.5" fill="rgba(255,255,255,0.55)"/>
  <circle cx="256" cy="38" r="1.5" fill="rgba(255,255,255,0.35)"/>
  <circle cx="264" cy="58" r="2" fill="rgba(255,255,255,0.28)"/>

  <!-- НИТЬ logotype -->
  <text
    x="256" y="400"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52"
    font-weight="400"
    fill="rgba(255,255,255,0.88)"
    text-anchor="middle"
    letter-spacing="18"
  >НИТЬ</text>

  <!-- Decorative lines flanking text -->
  <line x1="88" y1="375" x2="148" y2="375" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <line x1="364" y1="375" x2="424" y2="375" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- Tagline -->
  <text
    x="256" y="436"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="16"
    font-weight="300"
    fill="rgba(255,255,255,0.28)"
    text-anchor="middle"
    letter-spacing="4"
  >НАЙДИ СВОЕГО ЧЕЛОВЕКА</text>
</svg>
